<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiguMatch — Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #00C853;
    --green-dark: #009624;
    --gold: #FFD600;
    --dark: #0a0f0a;
    --card: #111811;
    --card2: #161e16;
    --border: rgba(0,200,83,0.15);
    --text: #e8f5e9;
    --muted: #6a7c6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(0,200,83,0.03) 40px, rgba(0,200,83,0.03) 41px); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 0 0 80px; }
  header { padding: 28px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--green); line-height: 1; }
  .logo span { color: var(--gold); }
  .badge-mundial { background: var(--gold); color: #111; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; }
  .hero { padding: 8px 20px 24px; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1.0; letter-spacing: 1px; margin-bottom: 8px; }
  .hero h1 em { color: var(--green); font-style: normal; }
  .hero p { color: var(--muted); font-size: 14px; line-height: 1.5; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin: 0 16px 16px; padding: 20px; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green); margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  input, select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: var(--green); }
  select option { background: #111; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .figu-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .figu-label .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: #f44336; }
  .figu-label span { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); }
  .figu-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .figu-input-row input { flex: 1; }
  .btn-add { width: 42px; height: 42px; flex-shrink: 0; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--green); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-weight: 300; }
  .btn-add:hover { background: rgba(0,200,83,0.1); border-color: var(--green); }
  .figu-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 10px; }
  .figu-tag { background: rgba(0,200,83,0.12); border: 1px solid rgba(0,200,83,0.3); color: var(--green); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 5px; animation: tagPop 0.2s ease; }
  .figu-tag.need { background: rgba(244,67,54,0.1); border-color: rgba(244,67,54,0.3); color: #ef9a9a; }
  .figu-tag button { background: none; border: none; color: inherit; cursor: pointer; padding: 0; font-size: 13px; line-height: 1; opacity: 0.6; }
  @keyframes tagPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .btn-match { display: block; width: calc(100% - 32px); margin: 4px 16px 0; padding: 18px; background: var(--green); color: #000; border: none; border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-match:hover { background: #00e060; transform: translateY(-1px); }
  .btn-match:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .match-result { margin: 16px 16px 0; display: none; }
  .match-result.show { display: block; }
  .match-card { background: linear-gradient(135deg, rgba(0,200,83,0.15), rgba(0,200,83,0.05)); border: 1px solid rgba(0,200,83,0.4); border-radius: 16px; padding: 20px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .match-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .match-avatar { width: 48px; height: 48px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .match-info h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--green); }
  .match-info p { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .match-figus { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 13px; }
  .match-figus .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .match-figus .row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
  .match-figus .label { color: var(--muted); }
  .match-figus .val { color: var(--text); font-weight: 500; }
  .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: #25D366; color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-whatsapp:hover { background: #20b857; }
  nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,15,10,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 16px; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 16px; border-radius: 10px; transition: all 0.15s; border: none; background: none; color: var(--muted); }
  .nav-item.active { color: var(--green); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }
  .empty-tags { font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 0; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,200,83,0.4); } 50% { box-shadow: 0 0 0 8px rgba(0,200,83,0); } }
  .btn-match.ready { animation: pulse 2s infinite; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Figu<span>Match</span></div>
    <div class="badge-mundial">⚽ Mundial 2026</div>
  </header>

  <div class="hero">
    <h1>Completá<br>tu <em>álbum.</em></h1>
    <p>Cargá tus figuritas repetidas y las que te faltan. Te conectamos con alguien de tu zona para hacer el cambio.</p>
  </div>

  <!-- PERFIL -->
  <div class="card">
    <div class="card-title">Tu perfil</div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Ej: Matías García" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" id="ciudad" placeholder="Paraná" />
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" id="wsp" placeholder="3434000000" />
      </div>
    </div>
  </div>

  <!-- FIGURITAS -->
  <div class="card">
    <div class="card-title">Mis figuritas</div>
    <div class="figu-label">
      <div class="dot dot-green"></div>
      <span>Tengo (repetidas)</span>
    </div>
    <div class="figu-input-row">
      <input type="text" id="input-tengo" placeholder="Ej: 47, 112, 203..." />
      <button class="btn-add" onclick="agregarFigu('tengo')">+</button>
    </div>
    <div class="figu-tags" id="tags-tengo">
      <span class="empty-tags">Todavía no agregaste ninguna</span>
    </div>

    <div class="divider"></div>

    <div class="figu-label">
      <div class="dot dot-red"></div>
      <span>Me faltan</span>
    </div>
    <div class="figu-input-row">
      <input type="text" id="input-necesito" placeholder="Ej: 8, 55, 301..." />
      <button class="btn-add" onclick="agregarFigu('necesito')">+</button>
    </div>
    <div class="figu-tags" id="tags-necesito">
      <span class="empty-tags">Todavía no agregaste ninguna</span>
    </div>
  </div>

  <button class="btn-match" id="btn-match" onclick="registrarYBuscar()">
    ⚡ BUSCAR MATCH
  </button>

  <div class="match-result" id="match-result"></div>

</div>

<nav>
  <button class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">INICIO</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">🔁</span>
    <span class="nav-label">MIS FIGUS</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">PREMIOS</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">PERFIL</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  // ── SUPABASE ──────────────────────────────────────────
  const { createClient } = supabase;
  const sb = createClient(
    'https://ofndbktrcqgvjbewydvn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mbmRia3RyY3FndmpiZXd5ZHZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzE4NzUsImV4cCI6MjA5NTIwNzg3NX0.oa8h7OzoERbmcGssG8Q8AVS-AkLvKjYVb3nyi7nChQI'
  );

  // ── ESTADO ────────────────────────────────────────────
  const state = { tengo: [], necesito: [] };

  // ── TOAST ─────────────────────────────────────────────
  function toast(msg, dur = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  // ── FIGURITAS UI ──────────────────────────────────────
  function agregarFigu(tipo) {
    const input = document.getElementById('input-' + tipo);
    const nums = input.value.trim().split(/[\s,]+/).map(n => parseInt(n)).filter(n => !isNaN(n) && n > 0);
    if (!nums.length) return;
    nums.forEach(n => { if (!state[tipo].includes(n)) state[tipo].push(n); });
    input.value = '';
    renderTags(tipo);
    checkReady();
  }

  function renderTags(tipo) {
    const container = document.getElementById('tags-' + tipo);
    const isNeed = tipo === 'necesito';
    if (!state[tipo].length) {
      container.innerHTML = '<span class="empty-tags">Todavía no agregaste ninguna</span>';
      return;
    }
    container.innerHTML = state[tipo].map(n => `
      <div class="figu-tag ${isNeed ? 'need' : ''}">
        #${n}<button onclick="quitarFigu('${tipo}', ${n})">×</button>
      </div>`).join('');
  }

  function quitarFigu(tipo, num) {
    state[tipo] = state[tipo].filter(n => n !== num);
    renderTags(tipo);
    checkReady();
  }

  function checkReady() {
    const btn = document.getElementById('btn-match');
    btn.classList.toggle('ready', state.tengo.length > 0 && state.necesito.length > 0);
  }

  // ── REGISTRAR Y BUSCAR ────────────────────────────────
  async function registrarYBuscar() {
    const nombre = document.getElementById('nombre').value.trim();
    const ciudad = document.getElementById('ciudad').value.trim();
    const wsp    = document.getElementById('wsp').value.trim();

    if (!nombre || !ciudad || !wsp) { toast('⚠️ Completá nombre, ciudad y WhatsApp'); return; }
    if (!state.tengo.length || !state.necesito.length) { toast('⚠️ Agregá figuritas en ambas listas'); return; }

    const btn = document.getElementById('btn-match');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>BUSCANDO...';

    try {
      // 1. Guardar usuario
      const { data: usuario, error: errU } = await sb
        .from('usuarios')
        .insert({ nombre, ciudad: ciudad.toLowerCase(), whatsapp: wsp })
        .select()
        .single();

      if (errU) throw errU;

      // 2. Guardar figuritas
      const figus = [
        ...state.tengo.map(n => ({ usuario_id: usuario.id, numero: n, tipo: 'tengo' })),
        ...state.necesito.map(n => ({ usuario_id: usuario.id, numero: n, tipo: 'necesito' }))
      ];
      const { error: errF } = await sb.from('figuritas').insert(figus);
      if (errF) throw errF;

      // 3. Buscar matches — usuarios de la misma ciudad
      const { data: otrosUsuarios, error: errO } = await sb
        .from('usuarios')
        .select('*, figuritas(*)')
        .ilike('ciudad', ciudad.toLowerCase())
        .neq('id', usuario.id);

      if (errO) throw errO;

      // 4. Calcular mejor match
      let mejor = null, mejorScore = -1;
      (otrosUsuarios || []).forEach(u => {
        const suTengo    = u.figuritas.filter(f => f.tipo === 'tengo').map(f => f.numero);
        const suNecesito = u.figuritas.filter(f => f.tipo === 'necesito').map(f => f.numero);
        const yoDoy      = state.tengo.filter(n => suNecesito.includes(n));
        const yoRecibo   = state.necesito.filter(n => suTengo.includes(n));
        const score      = yoDoy.length + yoRecibo.length;
        if (score > mejorScore) { mejorScore = score; mejor = { ...u, _doy: yoDoy, _recibo: yoRecibo }; }
      });

      mostrarResultado(mejor, mejorScore, nombre, ciudad);

    } catch (err) {
      console.error(err);
      toast('❌ Error: ' + (err.message || 'algo salió mal'));
    } finally {
      btn.disabled = false;
      btn.innerHTML = '⚡ BUSCAR MATCH';
    }
  }

  // ── MOSTRAR RESULTADO ─────────────────────────────────
  function mostrarResultado(mejor, score, miNombre, miCiudad) {
    const result = document.getElementById('match-result');
    result.className = 'match-result show';

    if (!mejor || score === 0) {
      result.innerHTML = `
        <div class="match-card" style="text-align:center;padding:24px 20px">
          <div style="font-size:36px;margin-bottom:10px">😔</div>
          <div style="font-weight:600;color:var(--text);margin-bottom:6px">Sin match todavía</div>
          <div style="font-size:13px;color:var(--muted)">No hay nadie cerca con figuritas compatibles aún. ¡Compartí la app para que se sumen más!</div>
        </div>`;
      toast('✅ Tus figuritas quedaron guardadas');
      result.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const msg = encodeURIComponent(
      `Hola ${mejor.nombre}! Te escribo desde FiguMatch ⚽🌍\n\nTengo las figus que te faltan: ${mejor._doy.map(n=>'#'+n).join(', ')}\nY me faltan: ${mejor._recibo.map(n=>'#'+n).join(', ')}\n\n¿Hacemos el cambio?\nSoy ${miNombre} de ${miCiudad}.`
    );

    result.innerHTML = `
      <div class="match-card">
        <div class="match-header">
          <div class="match-avatar">🤝</div>
          <div class="match-info">
            <h3>${mejor.nombre}</h3>
            <p>📍 ${mejor.ciudad}</p>
          </div>
        </div>
        <div class="match-figus">
          <div class="row"><span class="label">Él/ella tiene lo que te falta:</span><span class="val" style="color:var(--green)">${mejor._recibo.map(n=>'#'+n).join(', ') || '—'}</span></div>
          <div class="row"><span class="label">Le das a él/ella:</span><span class="val">${mejor._doy.map(n=>'#'+n).join(', ') || '—'}</span></div>
          <div class="row"><span class="label">Figuritas en juego:</span><span class="val" style="color:var(--gold)">${score} figuritas</span></div>
        </div>
        <button class="btn-whatsapp" onclick="window.open('https://wa.me/54${mejor.whatsapp}?text=${msg}')">
          💬 Contactar por WhatsApp
        </button>
      </div>`;

    toast('🎉 ¡Match encontrado!');
    result.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── ENTER en inputs ───────────────────────────────────
  document.getElementById('input-tengo').addEventListener('keydown', e => { if (e.key === 'Enter') agregarFigu('tengo'); });
  document.getElementById('input-necesito').addEventListener('keydown', e => { if (e.key === 'Enter') agregarFigu('necesito'); });
</script>
</body>
</html>
